name: Sandbox E2E Tests

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel in-progress runs for the same branch/PR on new pushes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── DinD sandbox ─────────────────────────────────────────────────────────────
  dind-e2e:
    name: DinD — isolation check + tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make e2e scripts executable
        run: chmod +x e2e-tests/*.sh

      - name: Run DinD e2e tests
        run: e2e-tests/test_dind.sh

  # ── DinD + Proxy sandbox ──────────────────────────────────────────────────────
  dind-proxy-e2e:
    name: DinD-Proxy — isolation check + proxy + tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make e2e scripts executable
        run: chmod +x e2e-tests/*.sh

      - name: Run DinD-Proxy e2e tests
        run: e2e-tests/test_dind_proxy.sh
