name: Sandbox E2E Tests

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel in-progress runs for the same branch/PR on new pushes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── DinD sandbox ──────────────────────────────────────────────────────────────
  dind-e2e:
    name: DinD
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make e2e scripts executable
        run: chmod +x e2e-tests/*.sh

      - name: Run DinD e2e tests
        run: e2e-tests/test_dind.sh

  # ── DinD + Proxy sandbox ──────────────────────────────────────────────────────
  dind-proxy-e2e:
    name: DinD-Proxy
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make e2e scripts executable
        run: chmod +x e2e-tests/*.sh

      - name: Run DinD-Proxy e2e tests
        run: e2e-tests/test_dind_proxy.sh

  # ── DooD sandbox ──────────────────────────────────────────────────────────────
  dood-e2e:
    name: DooD
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make e2e scripts executable
        run: chmod +x e2e-tests/*.sh

      - name: Run DooD e2e tests
        run: e2e-tests/test_dood.sh

  # ── DooD + Proxy sandbox ──────────────────────────────────────────────────────
  dood-proxy-e2e:
    name: DooD-Proxy
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make e2e scripts executable
        run: chmod +x e2e-tests/*.sh

      - name: Run DooD-Proxy e2e tests
        run: e2e-tests/test_dood_proxy.sh

