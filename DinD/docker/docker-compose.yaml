services:
  # Nested Docker daemon — inner daemon, workspace mounted at /workspace
  # All CLI/app containers are built and run inside this via sandbox-start.sh
  shell:
    profiles: ["sandbox"]
    container_name: claude-sandbox-shell
    image: docker:27-dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    volumes:
      - ..:/workspace:rw
      - shell-storage:/var/lib/docker

volumes:
  shell-storage:
