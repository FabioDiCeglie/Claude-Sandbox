# =============================================================
#  Squid egress-filter for claude-sandbox (Colima VM variant)
#  Default policy: DENY ALL — only the allowlist below passes.
#
#  Squid runs as a process inside the Colima VM.
#  iptables in the VM ensures direct port 80/443 bypasses are
#  blocked at the kernel level — Squid is the only path out.
# =============================================================

http_port 3128

# ----------------------------------------------------------
# Port ACLs
# ----------------------------------------------------------
acl SSL_ports  port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT    method CONNECT

# ----------------------------------------------------------
# Allowlisted destinations
# ----------------------------------------------------------

# Python / PyPI
acl allowed dstdomain .pypi.org
acl allowed dstdomain .pythonhosted.org

# Claude / Anthropic API
acl allowed dstdomain .anthropic.com

# Docker registries
acl allowed dstdomain .docker.io
acl allowed dstdomain .docker.com
acl allowed dstdomain .ghcr.io

# npm / Node.js packages
acl allowed dstdomain .npmjs.org
acl allowed dstdomain .npmjs.com
acl allowed dstdomain deb.nodesource.com

# Debian / apt
acl allowed dstdomain .debian.org

# Ubuntu / apt (VM OS package manager)
acl allowed dstdomain .ubuntu.com

# uv / Astral
acl allowed dstdomain .astral.sh

# GitHub
acl allowed dstdomain .github.com
acl allowed dstdomain .githubusercontent.com

# ----------------------------------------------------------
# Access rules (order matters — first match wins)
# ----------------------------------------------------------
http_access deny  !Safe_ports
http_access deny  CONNECT !SSL_ports
http_access allow allowed
http_access deny  all

# ----------------------------------------------------------
# Logging
# ----------------------------------------------------------
access_log /var/log/squid/access.log squid
cache_log  /var/log/squid/cache.log

# No on-disk cache — keep things transparent
cache deny all
